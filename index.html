<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=100">
    <title>🥔 Funky Potato Chip</title>
    <style>
        :root {
            --chip-color: #f4d03f;
            --chip-border: #d4ac0d;
            --btn-color: #e74c3c;
            --btn-hover: #c0392b;
            --bg-color: #2c3e50;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #34495e 0%, #1a252f 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            perspective: 1000px;
        }

        /* 舞台容器 */
        .stage {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            animation: spin 4s linear infinite;
        }

        /* 洋芋片本體 (模擬雙面) */
        .chip {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%; /* 圓形洋芋片 */
            background: var(--chip-color);
            border: 4px solid var(--chip-border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 0 30px rgba(244, 208, 63, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: visible;
            /* 模擬洋芋片的皺褶紋理 */
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 20%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1) 0%, transparent 25%);
        }

        .front {
            transform: rotateY(0deg);
        }

        .back {
            transform: rotateY(180deg);
            background: #e5c335; /* 背面顏色稍暗 */
        }

        /* 裝飾文字 */
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #d35400;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
            transform: translateZ(1px); /* 稍微浮起 */
        }

        /* 按鈕容器 (固定在洋芋片的一個角) */
        .corner-btn-container {
            position: absolute;
            top: -20px;
            right: -20px;
            transform: translateZ(20px); /* 讓按鈕浮在洋芋片前方 */
            transform-style: preserve-3d;
            /* 讓按鈕始終面向觀眾，不隨洋芋片旋轉（可选，這裡選擇隨洋芋片轉更有感覺） */
            /* transform: translateZ(20px) rotateY(0deg); */ 
        }

        .funky-btn {
            background: var(--btn-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .funky-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.8);
        }

        .funky-btn:active {
            transform: scale(0.95);
        }

        /* 播放中的動畫效果 */
        .playing .funky-btn {
            animation: pulse-btn 0.5s infinite alternate;
            background: #2ecc71; /* 播放時變綠 */
        }

        @keyframes spin {
            0% { transform: rotateX(20deg) rotateY(0deg); }
            100% { transform: rotateX(20deg) rotateY(360deg); }
        }

        @keyframes pulse-btn {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .status {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 1.2rem;
            opacity: 0.8;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="stage" id="chipStage">
        <div class="chip">
            <div class="face front">
                <div class="logo">CRUNCHY</div>
                <!-- 按鈕放在右上角 -->
                <div class="corner-btn-container">
                    <button class="funky-btn" id="playBtn">FUNKY</button>
                </div>
            </div>
            <div class="face back">
                <div class="logo">CRUNCHY</div>
            </div>
        </div>
    </div>

    <div class="status" id="statusText">點擊按鈕播放 Funky Town 🎵</div>

    <!-- 音樂檔案 (使用公開的 MP3 連結) -->
    <!-- 注意：如果此連結失效，請替換為有效的 MP3 網址 -->
    <audio id="audioPlayer" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        您的瀏覽器不支持音頻元素。
    </audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const audio = document.getElementById('audioPlayer');
        const statusText = document.getElementById('statusText');
        const stage = document.getElementById('chipStage');
        let isPlaying = false;

        // 為了演示，我們使用一首免費的 Funky 風格音樂
        // 如果你有 Funky Town 的 MP3，請替換 src 屬性
        // 這裡使用 SoundHelix 的一首節奏感強的曲子作為替代
        
        playBtn.addEventListener('click', async () => {
            try {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    playBtn.textContent = "FUNKY";
                    playBtn.style.background = "var(--btn-color)";
                    statusText.textContent = "暫停中...";
                    stage.classList.remove('playing');
                } else {
                    await audio.play();
                    isPlaying = true;
                    playBtn.textContent = "STOP";
                    playBtn.style.background = "#2ecc71";
                    statusText.textContent = "🎶 播放中：Funky Vibe! 🎶";
                    stage.classList.add('playing');
                }
            } catch (error) {
                console.error("播放失敗:", error);
                statusText.textContent = "點擊頁面任意處再試一次 (瀏覽器限制)";
            }
        });

        // 如果第一次點擊失敗，提示用戶
        audio.addEventListener('error', (e) => {
            statusText.textContent = "音樂載入失敗，請檢查網路或連結。";
        });
    </script>
</body>
</html>
