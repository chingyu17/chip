<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧊 FUNKY CUBE MANIA</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            perspective: 1000px;
        }

        /* 背景閃爍 */
        .bg-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
            opacity: 0.3;
            animation: bgChange 0.5s infinite alternate;
            z-index: -1;
        }

        @keyframes bgChange {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 舞台 */
        .stage {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            /* 預設動畫速度 */
            animation: crazyCube 3s infinite linear;
        }

        /* 立方體 */
        .cube {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            backface-visibility: visible;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            /* 霓虹邊框顏色 */
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.2);
        }

        /* 六個面的位置 */
        .front  { transform: rotateY(0deg) translateZ(100px); }
        .back   { transform: rotateY(180deg) translateZ(100px); }
        .right  { transform: rotateY(90deg) translateZ(100px); }
        .left   { transform: rotateY(-90deg) translateZ(100px); }
        .top    { transform: rotateX(90deg) translateZ(100px); }
        .bottom { transform: rotateX(-90deg) translateZ(100px); }

        /* 瘋狂跳舞動畫 (扭曲 + 旋轉 + 縮放) */
        @keyframes crazyCube {
            0% { transform: rotateX(0deg) rotateY(0deg) scale(1) skew(0deg); }
            25% { transform: rotateX(45deg) rotateY(90deg) scale(1.2) skew(15deg); }
            50% { transform: rotateX(90deg) rotateY(180deg) scale(0.8) skew(-15deg); }
            75% { transform: rotateX(45deg) rotateY(270deg) scale(1.2) skew(15deg); }
            100% { transform: rotateX(0deg) rotateY(360deg) scale(1) skew(0deg); }
        }

        /* 懸浮按鈕 */
        .fixed-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #ff00ff;
            color: #fff;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffff;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulseBtn 1s infinite;
            font-family: 'Comic Sans MS', sans-serif;
        }

        .fixed-btn:hover {
            transform: scale(1.2) rotate(-5deg);
            background: #00ffff;
            color: #ff00ff;
            box-shadow: 0 0 40px #ff00ff;
        }

        .fixed-btn:active {
            transform: scale(0.9);
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #ff00ff;
            text-align: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="bg-flash"></div>

    <button class="fixed-btn" id="playBtn">🕺 FUNKY!</button>

    <div class="stage" id="cubeStage">
        <div class="cube">
            <div class="face front">😎</div>
            <div class="face back">🤪</div>
            <div class="face right">🕺</div>
            <div class="face left">💃</div>
            <div class="face top">🤖</div>
            <div class="face bottom">👽</div>
        </div>
    </div>

    <div class="status" id="statusText">點擊按鈕讓立方體瘋狂起來！</div>

    <audio id="audioPlayer" loop>
        <!-- 替換成你的 Funky Town MP3 -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const audio = document.getElementById('audioPlayer');
        const statusText = document.getElementById('statusText');
        const cubeStage = document.getElementById('cubeStage');
        let isPlaying = false;

        playBtn.addEventListener('click', async () => {
            try {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    playBtn.textContent = "🕺 FUNKY!";
                    playBtn.style.background = "#ff00ff";
                    playBtn.style.color = "#fff";
                    statusText.textContent = "暫停中...";
                    cubeStage.style.animationDuration = "3s"; // 恢復正常速度
                } else {
                    await audio.play();
                    isPlaying = true;
                    playBtn.textContent = "🛑 STOP";
                    playBtn.style.background = "#00ff00";
                    playBtn.style.color = "#000";
                    statusText.textContent = "🎶 FUNKY CUBE ACTIVATED! 🎶";
                    cubeStage.style.animationDuration = "0.3s"; // 音樂快時，立方體轉超快！
                }
            } catch (error) {
                statusText.textContent = "請點擊頁面任意處再試一次";
            }
        });
    </script>
</body>
</html>
