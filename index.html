<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥔 FUNKY CHIP MEME</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            perspective: 1000px;
        }

        /* 背景閃爍效果 */
        .bg-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00);
            opacity: 0.2;
            animation: bgChange 0.5s infinite alternate;
            z-index: -1;
        }

        @keyframes bgChange {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 舞台 */
        .stage {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            animation: crazyDance 2s infinite linear;
        }

        /* 洋芋片本體 (Funky 風格) */
        .chip {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            /* 誇張的不規則形狀 */
            border-radius: 50% 40% 60% 30% / 40% 60% 30% 50%;
            background: #ffcc00;
            border: 5px solid #ff00ff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 20px #ff00ff;
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: visible;
            overflow: hidden;
        }

        .front {
            transform: rotateY(0deg);
            /* 瘋狂的紋理 */
            background-image: 
                radial-gradient(circle at 30% 30%, #fff 10%, transparent 11%),
                radial-gradient(circle at 70% 70%, #fff 10%, transparent 11%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,0,255,0.2) 10px, rgba(255,0,255,0.2) 20px);
        }

        .back {
            transform: rotateY(180deg);
            background: #00ffff;
            border-color: #ffcc00;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 20px #00ffff;
        }

        /* 洋芋片上的表情 (Funky 靈魂) */
        .face::after {
            content: "😎";
            font-size: 4rem;
            filter: drop-shadow(0 0 5px #fff);
            animation: faceShake 0.2s infinite;
        }

        /* 瘋狂跳舞動畫 */
        @keyframes crazyDance {
            0% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
            25% { transform: rotateX(20deg) rotateY(45deg) scale(1.1) skewX(10deg); }
            50% { transform: rotateX(0deg) rotateY(90deg) scale(0.9) skewY(-10deg); }
            75% { transform: rotateX(-20deg) rotateY(135deg) scale(1.1) skewX(-10deg); }
            100% { transform: rotateX(0deg) rotateY(180deg) scale(1); }
        }

        @keyframes faceShake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
            100% { transform: rotate(0deg); }
        }

        /* 懸浮按鈕 (固定位置，不按不到) */
        .fixed-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #ff00ff;
            color: #fff;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #00ffff;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulseBtn 1s infinite;
        }

        .fixed-btn:hover {
            transform: scale(1.2) rotate(-5deg);
            background: #00ffff;
            color: #ff00ff;
            box-shadow: 0 0 40px #ff00ff;
        }

        .fixed-btn:active {
            transform: scale(0.9);
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #ff00ff;
            text-align: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="bg-flash"></div>

    <!-- 懸浮按鈕 (固定，不會隨旋轉移動) -->
    <button class="fixed-btn" id="playBtn">🕺 FUNKY!</button>

    <div class="stage" id="chipStage">
        <div class="chip">
            <div class="face front"></div>
            <div class="face back"></div>
        </div>
    </div>

    <div class="status" id="statusText">點擊按鈕讓洋芋片瘋狂起來！</div>

    <audio id="audioPlayer" loop>
        <!-- 替換成你的 Funky Town MP3 -->
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const audio = document.getElementById('audioPlayer');
        const statusText = document.getElementById('statusText');
        const chipStage = document.getElementById('chipStage');
        let isPlaying = false;

        playBtn.addEventListener('click', async () => {
            try {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    playBtn.textContent = "🕺 FUNKY!";
                    playBtn.style.background = "#ff00ff";
                    playBtn.style.color = "#fff";
                    statusText.textContent = "暫停中...";
                    chipStage.style.animationDuration = "2s"; // 恢復正常速度
                } else {
                    await audio.play();
                    isPlaying = true;
                    playBtn.textContent = "🛑 STOP";
                    playBtn.style.background = "#00ff00";
                    playBtn.style.color = "#000";
                    statusText.textContent = "🎶 FUNKY TOWN ACTIVATED! 🎶";
                    chipStage.style.animationDuration = "0.5s"; // 音樂快時，洋芋片轉更快
                }
            } catch (error) {
                statusText.textContent = "請點擊頁面任意處再試一次";
            }
        });
    </script>
</body>
</html>
